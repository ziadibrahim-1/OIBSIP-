<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure, authenticated user profile management.">
    <title>Profile Settings - AuthSystem</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Strict Session Route Protection Guard -->
    <script>
        (function() {
            const session = localStorage.getItem('auth_session') || sessionStorage.getItem('auth_session');
            if (!session) {
                window.location.replace('login.html');
            }
        })();
    </script>
</head>
<body class="dashboard-layout">
    <div class="dashboard-container">
        <!-- Navigation Sidebar -->
        <aside class="dashboard-sidebar">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                <span>AuthSystem</span>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"/>
                    </svg>
                    <span>Overview</span>
                </a>
                <a href="profile.html" class="active">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    <span>Profile Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-danger-outline btn-full">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M13 3h-2v10h2V3zm4 1.84l-1.41 1.41C17.14 7.46 18 9.13 18 11c0 3.31-2.69 6-6 6s-6-2.69-6-6c0-1.87.86-3.54 2.41-4.75L7 4.84C5.17 6.42 4 8.76 4 11c0 4.42 3.58 8 8 8s8-3.58 8-8c0-2.24-1.17-4.58-3-6.16z"/>
                    </svg>
                    <span>Sign Out</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Viewport -->
        <main class="dashboard-main">
            <header class="dashboard-header">
                <div class="header-welcome">
                    <h2>Profile Settings</h2>
                    <p>Manage your account settings, profile description, and credentials.</p>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle" class="btn-icon" aria-label="Toggle theme" title="Toggle theme">
                        <svg class="sun-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M12,7c-2.76,0-5,2.24-5,5s2.24,5,5,5s5-2.24,5-5S14.76,7,12,7L12,7z M2,13h2c0.55,0,1-0.45,1-1s-0.45-1-1-1H2 c-0.55,0-1,0.45-1,1S1.45,13,2,13z M20,13h2c0.55,0,1-0.45,1-1s-0.45-1-1-1h-2c-0.55,0-1,0.45-1,1S19.45,13,20,13z M11,2v2 c0,0.55,0.45,1,1,1s1-0.45,1-1V2c0-0.55-0.45-1-1-1S11,1.45,11,2z M11,20v2c0,0.55,0.45,1,1,1s1-0.45,1-1v-2c0-0.55-0.45-1-1-1 S11,19.45,11,20z M5.99,4.58c-0.39-0.39-1.03-0.39-1.41,0s-0.39,1.03,0,1.41l1.06,1.06c0.39,0.39,1.03,0.39,1.41,0 s0.39-1.03,0-1.41L5.99,4.58z M18.36,16.95c-0.39-0.39-1.03-0.39-1.41,0s-0.39,1.03,0,1.41l1.06,1.06c0.39,0.39,1.02,0.39,1.41,0 s0.39-1.03,0-1.41L18.36,16.95z M7.05,18.36l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0l1.06-1.06c0.39-0.39,0.39-1.03,0-1.41S7.44,17.97,7.05,18.36z M16.95,5.99l1.06-1.06c0.39-0.39,0.39-1.03,0-1.41s-1.03-0.39-1.41,0 l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41S16.56,6.38,16.95,5.99z"/>
                        </svg>
                        <svg class="moon-icon hidden" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M12.3,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 21.64,9.35C20.6,10.97 18.79,12 16.73,12C13.56,12 11,9.44 11,6.27C11,4.21 12.03,2.4 13.65,1.36C13.2,1.3 12.75,1.27 12.3,2Z"/>
                        </svg>
                    </button>
                </div>
            </header>

            <section class="dashboard-body flex-col">
                <!-- Profile Settings Card -->
                <div class="details-card">
                    <h3>Update Profile Info</h3>
                    <form id="profile-info-form" class="auth-form mt-10">
                        <div class="form-group">
                            <label for="prof-name">Full Name</label>
                            <input type="text" id="prof-name" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label for="prof-bio">Short Biography</label>
                            <textarea id="prof-bio" rows="3" placeholder="Tell us something about yourself..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <span class="btn-text">Save Changes</span>
                            <span class="btn-loader hidden"></span>
                        </button>
                    </form>
                </div>

                <!-- Password Change Card -->
                <div class="details-card">
                    <h3>Change Password</h3>
                    <form id="profile-password-form" class="auth-form mt-10">
                        <!-- Old Password -->
                        <div class="form-group">
                            <label for="pass-old">Current Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="pass-old" required placeholder="Verify current password">
                                <button type="button" class="btn-toggle-password" aria-label="Toggle password visibility" title="Show password">
                                    <svg class="eye-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                    </svg>
                                    <svg class="eye-off-icon hidden" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                        <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.17c0-1.66-1.34-3-3-3l-.17.02z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- New Password -->
                        <div class="form-group">
                            <label for="pass-new">New Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="pass-new" required placeholder="At least 8 characters">
                                <button type="button" class="btn-toggle-password" aria-label="Toggle password visibility" title="Show password">
                                    <svg class="eye-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                    </svg>
                                    <svg class="eye-off-icon hidden" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                        <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.17c0-1.66-1.34-3-3-3l-.17.02z"/>
                                    </svg>
                                </button>
                            </div>
                            <!-- Strength meter -->
                            <div class="strength-meter-container">
                                <div class="strength-meter-bars">
                                    <div class="strength-bar"></div>
                                    <div class="strength-bar"></div>
                                    <div class="strength-bar"></div>
                                    <div class="strength-bar"></div>
                                    <div class="strength-bar"></div>
                                </div>
                                <span id="strength-text" class="strength-text">Password Strength</span>
                            </div>
                        </div>

                        <!-- Confirm New Password -->
                        <div class="form-group">
                            <label for="pass-confirm">Confirm New Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="pass-confirm" required placeholder="Repeat your new password">
                                <button type="button" class="btn-toggle-password" aria-label="Toggle password visibility" title="Show password">
                                    <svg class="eye-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                    </svg>
                                    <svg class="eye-off-icon hidden" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                        <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.17c0-1.66-1.34-3-3-3l-.17.02z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <span class="btn-text">Update Password</span>
                            <span class="btn-loader hidden"></span>
                        </button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <!-- Toasts Portal -->
    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
