<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure, responsive login page featuring show/hide passwords, loading states, and dark mode.">
    <title>Sign In - AuthSystem</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Instant Public Route Protection Guard -->
    <script>
        (function() {
            const session = localStorage.getItem('auth_session') || sessionStorage.getItem('auth_session');
            if (session) {
                window.location.replace('dashboard.html');
            }
        })();
    </script>
</head>
<body class="auth-layout">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Access your dashboard with your credentials</p>
        </div>

        <form id="login-form" class="auth-form">
            <!-- Email Field -->
            <div class="form-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" required placeholder="name@example.com" autocomplete="email">
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <div class="label-row">
                    <label for="login-password">Password</label>
                </div>
                <div class="password-input-wrapper">
                    <input type="password" id="login-password" required placeholder="Enter your password">
                    <button type="button" class="btn-toggle-password" aria-label="Toggle password visibility" title="Show password">
                        <svg class="eye-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                        <svg class="eye-off-icon hidden" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.17c0-1.66-1.34-3-3-3l-.17.02z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Remember Me Row -->
            <div class="form-row">
                <label class="checkbox-label">
                    <input type="checkbox" id="login-remember">
                    <span>Remember Me</span>
                </label>
            </div>

            <!-- Submit Button with loading status -->
            <button type="submit" class="btn btn-primary btn-submit">
                <span class="btn-text">Sign In</span>
                <span class="btn-loader hidden"></span>
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Sign Up</a></p>
        </div>
    </div>

    <!-- Theme Switcher Toggle -->
    <button id="theme-toggle" class="btn-theme-floating" aria-label="Toggle theme" title="Toggle theme">
        <svg class="sun-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M12,7c-2.76,0-5,2.24-5,5s2.24,5,5,5s5-2.24,5-5S14.76,7,12,7L12,7z M2,13h2c0.55,0,1-0.45,1-1s-0.45-1-1-1H2 c-0.55,0-1,0.45-1,1S1.45,13,2,13z M20,13h2c0.55,0,1-0.45,1-1s-0.45-1-1-1h-2c-0.55,0-1,0.45-1,1S19.45,13,20,13z M11,2v2 c0,0.55,0.45,1,1,1s1-0.45,1-1V2c0-0.55-0.45-1-1-1S11,1.45,11,2z M11,20v2c0,0.55,0.45,1,1,1s1-0.45,1-1v-2c0-0.55-0.45-1-1-1 S11,19.45,11,20z M5.99,4.58c-0.39-0.39-1.03-0.39-1.41,0s-0.39,1.03,0,1.41l1.06,1.06c0.39,0.39,1.03,0.39,1.41,0 s0.39-1.03,0-1.41L5.99,4.58z M18.36,16.95c-0.39-0.39-1.03-0.39-1.41,0s-0.39,1.03,0,1.41l1.06,1.06c0.39,0.39,1.02,0.39,1.41,0 s0.39-1.03,0-1.41L18.36,16.95z M7.05,18.36l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0l1.06-1.06c0.39-0.39,0.39-1.03,0-1.41S7.44,17.97,7.05,18.36z M16.95,5.99l1.06-1.06c0.39-0.39,0.39-1.03,0-1.41s-1.03-0.39-1.41,0 l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41S16.56,6.38,16.95,5.99z"/>
        </svg>
        <svg class="moon-icon hidden" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M12.3,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 21.64,9.35C20.6,10.97 18.79,12 16.73,12C13.56,12 11,9.44 11,6.27C11,4.21 12.03,2.4 13.65,1.36C13.2,1.3 12.75,1.27 12.3,2Z"/>
        </svg>
    </button>

    <!-- Toasts Portal -->
    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
