<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A gorgeous, premium, glassmorphic web calculator built for Oasis Infobyte. Features dark/light mode, custom click sounds, calculation history, copy clipboard, and a safe mathematical parser.">
    <title>NeuraCalc - Premium Glassmorphism Calculator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Background Animated Glow Spheres -->
    <div class="background-decorations" aria-hidden="true">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <main class="calculator-app">
        <!-- Main Calculator Interface -->
        <div class="calculator-card">
            <!-- Header section with actions and branding -->
            <header class="calc-header">
                <div class="logo">
                    <span class="logo-dot"></span>
                    <h1>NeuraCalc</h1>
                </div>
                <div class="header-controls">
                    <!-- Sound Toggle -->
                    <button id="sound-toggle" class="control-btn active" aria-label="Toggle sound feedback" title="Toggle sound">
                        <svg class="sound-on-icon" viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/>
                        </svg>
                        <svg class="sound-off-icon hidden" viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M12,4L9.91,6.09L12,8.18M4.27,3L3,4.27L7.73,9H3V15H7L12,20V13.27L16.25,17.53C15.58,18.04 14.83,18.46 14,18.7V20.77C15.38,20.44 16.63,19.78 17.68,18.95L20.73,22L22,20.73L4.27,3M19,12C19,12.94 18.8,13.82 18.46,14.64L19.97,16.15C20.63,14.91 21,13.5 21,12C21,7.72 18,4.14 14,3.23V5.29C16.89,6.15 19,8.83 19,12M16.5,12C16.5,11.28 16.25,10.63 15.82,10.11L14,8.29V12M14,7.97V5.88L14.7,6.58C15.75,7 16.5,8.04 16.5,9.25C16.5,9.65 16.42,10.04 16.27,10.4L14.9,9.03C14.96,8.69 15,8.34 15,8C15,6.9 14.5,5.92 13.72,5.29L12.57,6.44C13,6.8 13.3,7.3 13.3,7.9V7.97H14Z"/>
                        </svg>
                    </button>
                    <!-- History Toggle -->
                    <button id="history-toggle" class="control-btn" aria-label="Toggle history panel" title="View history">
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M13.5,8H12V13L16.28,15.54L17,14.33L13.5,12.25V8M13,3A9,9 0 0,0 4,12H1L4.96,16.03L9,12H6A7,7 0 0,1 13,5A7,7 0 0,1 20,12A7,7 0 0,1 13,19C11.07,19 9.32,18.21 8.06,16.94L6.64,18.36C8.27,20 10.5,21 13,21A9,9 0 0,0 22,12A9,9 0 0,0 13,3Z"/>
                        </svg>
                    </button>
                    <!-- Theme Switcher -->
                    <button id="theme-toggle" class="control-btn" aria-label="Toggle theme" title="Toggle theme">
                        <svg class="sun-icon" viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7M12,5A7,7 0 0,0 5,12A7,7 0 0,0 12,19A7,7 0 0,0 19,12A7,7 0 0,0 12,5M12,2A1,1 0 0,1 13,3V5A1,1 0 0,1 12,6A1,1 0 0,1 11,5V3A1,1 0 0,1 12,2M12,18A1,1 0 0,1 13,19V21A1,1 0 0,1 12,22A1,1 0 0,1 11,21V19A1,1 0 0,1 12,18M20,11A1,1 0 0,1 21,12V13A1,1 0 0,1 20,14A1,1 0 0,1 19,13V12A1,1 0 0,1 20,11M4,11A1,1 0 0,1 5,12V13A1,1 0 0,1 4,14A1,1 0 0,1 3,13V12A1,1 0 0,1 4,11M18.36,5.64A1,1 0 0,1 19.07,6.34L17.66,7.76A1,1 0 0,1 16.25,7.76A1,1 0 0,1 16.25,6.34L17.66,4.93A1,1 0 0,1 18.36,5.64M5.64,18.36A1,1 0 0,1 6.34,19.07L4.93,20.48A1,1 0 0,1 3.5,20.48A1,1 0 0,1 3.5,19.07L4.93,17.66A1,1 0 0,1 5.64,18.36M18.36,18.36A1,1 0 0,1 17.66,19.07L16.25,17.66A1,1 0 0,1 16.25,16.25A1,1 0 0,1 17.66,16.25L19.07,17.66A1,1 0 0,1 18.36,18.36M5.64,5.64A1,1 0 0,1 6.34,4.93L7.76,6.34A1,1 0 0,1 7.76,7.76A1,1 0 0,1 6.34,7.76L4.93,6.34A1,1 0 0,1 5.64,5.64Z"/>
                        </svg>
                        <svg class="moon-icon hidden" viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M12.3,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 21.64,9.35C20.6,10.97 18.79,12 16.73,12C13.56,12 11,9.44 11,6.27C11,4.21 12.03,2.4 13.65,1.36C13.2,1.3 12.75,1.27 12.3,2Z"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Display Screen Area -->
            <section class="display-container" aria-label="Calculator display">
                <div class="expression-wrapper">
                    <span id="expression" class="expression-text" aria-live="polite"></span>
                    <span id="operator-indicator" class="operator-indicator"></span>
                </div>
                <div class="result-wrapper">
                    <span id="result" class="result-text" aria-live="polite">0</span>
                </div>
                <!-- Mini Copy Alert Triggered inside the screen -->
                <div id="toast" class="toast hidden" aria-live="assertive">Copied!</div>
            </section>

            <!-- Keyboard/Buttons Pad (CSS Grid) -->
            <section class="buttons-grid" aria-label="Calculator keypad">
                <!-- Row 1 -->
                <button id="btn-clear" class="btn btn-utility" data-action="clear" aria-label="Clear All">C</button>
                <button id="btn-backspace" class="btn btn-utility" data-action="backspace" aria-label="Backspace">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M19,4H7.38C6.44,4 5.58,4.5 5.12,5.33L1,12L5.12,18.66C5.58,19.5 6.44,20 7.38,20H19A2,2 0 0,0 21,18V6A2,2 0 0,0 19,4M19,18H7.38L3.68,12L7.38,6H19V18M16,8.41L14.59,7L11.5,10.09L8.41,7L7,8.41L10.09,11.5L7,14.59L8.41,16L11.5,12.91L14.59,16L16,14.59L12.91,11.5L16,8.41Z"/>
                    </svg>
                </button>
                <button id="btn-percent" class="btn btn-utility" data-action="percent" aria-label="Percentage">%</button>
                <button id="btn-divide" class="btn btn-operator" data-action="divide" aria-label="Division">÷</button>

                <!-- Row 2 -->
                <button class="btn btn-num" data-val="7">7</button>
                <button class="btn btn-num" data-val="8">8</button>
                <button class="btn btn-num" data-val="9">9</button>
                <button id="btn-multiply" class="btn btn-operator" data-action="multiply" aria-label="Multiplication">×</button>

                <!-- Row 3 -->
                <button class="btn btn-num" data-val="4">4</button>
                <button class="btn btn-num" data-val="5">5</button>
                <button class="btn btn-num" data-val="6">6</button>
                <button id="btn-subtract" class="btn btn-operator" data-action="subtract" aria-label="Subtraction">−</button>

                <!-- Row 4 -->
                <button class="btn btn-num" data-val="1">1</button>
                <button class="btn btn-num" data-val="2">2</button>
                <button class="btn btn-num" data-val="3">3</button>
                <button id="btn-add" class="btn btn-operator" data-action="add" aria-label="Addition">+</button>

                <!-- Row 5 -->
                <button id="btn-copy" class="btn btn-utility btn-copy" data-action="copy" aria-label="Copy result" title="Copy result">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z"/>
                    </svg>
                </button>
                <button class="btn btn-num" data-val="0">0</button>
                <button id="btn-decimal" class="btn btn-num" data-val="." aria-label="Decimal point">.</button>
                <button id="btn-equals" class="btn btn-equals" data-action="equals" aria-label="Equals">=</button>
            </section>
        </div>

        <!-- Slide-out Calculation History Panel -->
        <aside id="history-panel" class="history-panel hidden-panel" aria-label="Calculation History">
            <div class="history-header">
                <h2>History</h2>
                <button id="close-history" class="control-btn" aria-label="Close history" title="Close history">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/>
                    </svg>
                </button>
            </div>
            <div id="history-list" class="history-list">
                <!-- Fallback empty state -->
                <div class="empty-history">
                    <svg viewBox="0 0 24 24" width="40" height="40" class="empty-icon">
                        <path fill="currentColor" d="M13.5,8H12V13L16.28,15.54L17,14.33L13.5,12.25V8M13,3A9,9 0 0,0 4,12H1L4.96,16.03L9,12H6A7,7 0 0,1 13,5A7,7 0 0,1 20,12A7,7 0 0,1 13,19C11.07,19 9.32,18.21 8.06,16.94L6.64,18.36C8.27,20 10.5,21 13,21A9,9 0 0,0 22,12A9,9 0 0,0 13,3Z"/>
                    </svg>
                    <p>No history yet</p>
                </div>
            </div>
            <div class="history-footer">
                <button id="clear-history" class="btn-clear-history">Clear All</button>
            </div>
        </aside>
    </main>

    <!-- Footer credit -->
    <footer class="app-footer">
        <p>Oasis Infobyte Internship Project &bull; Built by Ziad Ibrahim &bull; 2026</p>
    </footer>

    <!-- Logic script -->
    <script src="js/script.js"></script>
</body>
</html>
